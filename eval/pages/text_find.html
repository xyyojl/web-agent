<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>WebAgent 文档 - 快速开始</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; color: #222; }
  code { background: #f2f2f2; padding: 2px 6px; border-radius: 4px; }
  pre { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 8px; overflow-x: auto; }

<body>
  <h1>WebAgent</h1>
  <p>当前版本：<span class="version-badge">v2.3.1</span></p>

  <h2>安装</h2>
  <p>通过 pip 安装 WebAgent：</p>
  <pre><code>pip install webagent</code></pre>

  <h2>简介</h2>
  <p>
    WebAgent 是一个用于浏览器自动化任务的智能体框架，支持感知、决策、执行的完整闭环。
    本页内容固定不变，用于 eval 测试文本查找类任务。
  </p>

  <h2>系统要求</h2>
  <ul>
    <li>Python 3.10 及以上</li>
    <li>Playwright 已安装浏览器内核</li>
    <li>Anthropic API Key</li>
  </ul>
</body>
