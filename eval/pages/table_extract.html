<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>排行榜 - 数据表格</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; color: #222; }
  table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
  th { background: #f5f5f5; }
</style>
</head>
<body>
  <h1>本周排行榜</h1>

  <table id="score-table">
    <thead>
      <tr><th>name</th><th>score</th></tr>
    </thead>
    <tbody>
      <tr><td>Alice</td><td>98</td></tr>
      <tr><td>Bob</td><td>91</td></tr>
      <tr><td>Charlie</td><td>87</td></tr>
      <tr><td>Diana</td><td>85</td></tr>
      <tr><td>Ethan</td><td>79</td></tr>
    </tbody>
  </table>
</body>
</html>
